<main class="login page-shell">
    <form class="card" (ngSubmit)="entrar()">
        <h1 class="script">Admin Isabella</h1>
        <p>Acesse para visualizar as confirmações de presença.</p>
        <div class="field">
            <label>E-mail</label>
            <input name="email" [(ngModel)]="email">
        </div>
        <div class="field">
            <label class="label-password">Senha</label>
            <input name="senha" type="password" [(ngModel)]="senha">
        </div>
        <p class="erro">{{erro}}</p>
        <button class="btn btn-primary">Entrar</button>
    </form>
</main>

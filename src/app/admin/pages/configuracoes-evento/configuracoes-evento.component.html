<h1>Configurações do Evento</h1><form class="card form" (ngSubmit)="salvar()"><div class="grid"><div class="field"><label>Nome da aniversariante</label><input name="nome" [(ngModel)]="evento.nomeAniversariante"></div><div class="field"><label>Idade</label><input name="idade" [(ngModel)]="evento.idade"></div><div class="field"><label>Data</label><input name="data" [(ngModel)]="evento.dataEvento"></div><div class="field"><label>Horário</label><input name="hora" [(ngModel)]="evento.horario"></div><div class="field"><label>Local da festa</label><input name="local" [(ngModel)]="evento.localFesta"></div><div class="field"><label>Endereço</label><input name="endereco" [(ngModel)]="evento.endereco"></div><div class="field full"><label>Link Google Maps</label><input name="maps" [(ngModel)]="evento.linkMaps"></div><div class="field full"><label>Mensagem</label><textarea name="msg" rows="4" [(ngModel)]="evento.mensagem"></textarea></div></div><p class="ok" *ngIf="salvo">Dados salvos com sucesso!</p><button class="btn btn-primary">Salvar alterações</button></form>

<div class="header"><h1>Confirmações</h1><button class="btn btn-primary" (click)="confirmacaoService.exportarCsv()">Exportar CSV</button></div><section class="card table-card"><input class="search" placeholder="Buscar por nome ou telefone..." [ngModel]="busca()" (ngModelChange)="busca.set($event)"><table><thead><tr><th>Nome</th><th>Telefone</th><th>Pessoas</th><th>Data</th><th>Status</th><th>Ações</th></tr></thead><tbody><tr *ngFor="let c of filtradas()"><td>{{c.nome}}</td><td>{{c.telefone}}</td><td>{{c.quantidadePessoas}}</td><td>{{c.criadoEm | date:'dd/MM/yyyy HH:mm'}}</td><td><span class="badge" [class.badge-ok]="c.status==='CONFIRMADO'" [class.badge-danger]="c.status==='CANCELADO'">{{c.status}}</span></td><td><button (click)="confirmacaoService.cancelar(c.id)">Cancelar</button><button (click)="confirmacaoService.excluir(c.id)">Excluir</button></td></tr></tbody></table></section>

<main class="page">
  <div class="artwork">
    <section class="video-area" aria-label="Vídeo do convite">
      <video
        #conviteVideo
        [src]="evento().videoUrl"
        [class.is-playing]="videoAtivo()"
        controls
        autoplay
        muted
        playsinline
        (play)="videoAtivo.set(true)"
        (pause)="videoAtivo.set(false)"
        (ended)="videoAtivo.set(false)">
      </video>

      <button
        *ngIf="!videoAtivo()"
        class="play-button"
        type="button"
        aria-label="Assistir ao vídeo"
        (click)="iniciarVideo(conviteVideo)">
        <span>▶</span>
      </button>
    </section>

    <button class="music-hotspot" type="button" aria-label="Ativar ou desativar som" (click)="alternarSom(conviteVideo)"></button>
    <a class="scroll-hotspot" href="#convite" aria-label="Ver detalhes do convite"></a>

    <section id="convite" class="interactive-area" aria-label="Detalhes do convite">
      <nav class="actions-row" aria-label="Ações do convite">
        <button class="action-card" type="button" (click)="modalAberto.set(true)">
          <span class="action-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5 13l4 4L19 7"/>
            </svg>
          </span>
          <span class="action-label">Confirme Presença</span>
        </button>
        <button class="action-card" type="button" (click)="abrirMapa()">
          <span class="action-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 21s7-4.5 7-11a7 7 0 1 0-14 0c0 6.5 7 11 7 11z"/>
              <circle cx="12" cy="10" r="2.5"/>
            </svg>
          </span>
          <span class="action-label">Local da Festa</span>
        </button>
        <button class="action-card" type="button" aria-label="Ver sugestões de presente">
          <span class="action-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="8" width="18" height="13" rx="1.5"/>
              <path d="M12 8V21M3 12h18M12 8c0-2.5-1.5-5-3-5s-3 2.5-3 5M12 8c0-2.5 1.5-5 3-5s3 2.5 3 5"/>
            </svg>
          </span>
          <span class="action-label">Sugestão de Presente</span>
        </button>
      </nav>
      <button class="hotspot confirm-large" type="button" aria-label="Confirmar presença" (click)="modalAberto.set(true)"></button>
      <button class="hotspot location-large" type="button" aria-label="Ver localização da festa" (click)="abrirMapa()"></button>
    </section>
  </div>

  <div class="modal-bg" *ngIf="modalAberto()" (click)="modalAberto.set(false)">
    <form class="modal" (ngSubmit)="confirmar()" (click)="$event.stopPropagation()">
      <button class="close" type="button" aria-label="Fechar" (click)="modalAberto.set(false)">×</button>
      <h2 class="script">Confirmar Presença</h2>
      <p *ngIf="enviado()" class="ok">Presença confirmada com sucesso!</p>
      <div class="field"><label>Nome completo</label><input name="nome" [(ngModel)]="form.nome" required></div>
      <div class="field"><label>Telefone / WhatsApp</label><input name="telefone" [(ngModel)]="form.telefone" required></div>
      <div class="field"><label>Quantidade de pessoas</label><input name="qtd" type="number" min="1" [(ngModel)]="form.quantidadePessoas"></div>
      <div class="field"><label>Observação</label><textarea name="obs" [(ngModel)]="form.observacao"></textarea></div>
      <button class="submit" type="submit">Confirmar Presença</button>
    </form>
  </div>
</main>
